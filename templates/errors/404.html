{% extends "layouts/base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div style="text-align:center; padding:80px 24px;">
    <div style="font-size:6rem; font-weight:900; color:var(--accent);">404</div>
    <h1 style="font-size:2rem; margin-bottom:16px;">Page Not Found</h1>
    <p style="color:var(--text-secondary); margin-bottom:32px;">The page you are looking for doesn't exist or has been
        moved.</p>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary btn-lg">🏠 Back to Home</a>
</div>
{% endblock %}
