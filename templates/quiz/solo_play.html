{% extends "layouts/base.html" %}
{% block title %}Solo Practice - {{ app_name }}{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/quiz.css') }}">
{% endblock %}
{% block content %}
<div id="quizContainer">
    <div class="quiz-layout">
        <div class="quiz-main">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div>
                    <h2 style="font-weight:700; margin-bottom:4px;" id="questionNumber">Question 1/{{
                        room.question_count }}</h2>
                    <span style="color:var(--text-secondary);" id="categoryLabel">Category</span>
                </div>
                <div class="timer" id="timerDisplay" style="font-size:1.8rem; font-weight:800; color:var(--accent);">20s
                </div>
            </div>
            <div id="questionText" style="font-size:1.3rem; font-weight:600; margin-bottom:32px;">Loading...</div>
            <div id="optionsContainer" class="options-grid"
                style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
            <div style="margin-top:auto; padding-top:24px; display:flex; justify-content:center;">
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-ghost">🚪 Leave</a>
            </div>
        </div>
        <div class="quiz-sidebar">
            <h3 style="font-weight:700; margin-bottom:16px;">Score</h3>
            <div id="scoreDisplay" style="font-size:2rem; font-weight:800; color:var(--accent);">0</div>
            <hr style="border-color:var(--border); margin:16px 0;">
            <h3 style="font-weight:700; margin-bottom:12px;">Progress</h3>
            <div id="progressList"></div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    window.roomCode = '{{ room.code }}';
    window.isSolo = true;
    window.totalQuestions = {{ room.question_count }};
</script>
<script src="{{ url_for('static', filename='js/solo_quiz.js') }}"></script>
{% endblock %}
