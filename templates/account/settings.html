{% extends "layouts/base.html" %}

{% block title %}Settings - {{ app_name }}{% endblock %}

{% block content %}
<h1 style="font-size:2rem;font-weight:800;margin-bottom:24px;">⚙️ Settings</h1>

<div class="glass" style="padding:32px;border-radius:24px;max-width:600px;margin-bottom:24px;">
    <h3 style="font-weight:700;margin-bottom:16px;">Change Password</h3>
    <form method="POST" action="{{ url_for('account.change_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom:16px;">
            <label style="display:block;margin-bottom:8px;font-weight:600;">Current Password</label>
            <input type="password" name="current_password" required
                   style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:inherit;">
        </div>
        <div style="margin-bottom:16px;">
            <label style="display:block;margin-bottom:8px;font-weight:600;">New Password</label>
            <input type="password" name="new_password" required
                   style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:inherit;">
        </div>
        <div style="margin-bottom:24px;">
            <label style="display:block;margin-bottom:8px;font-weight:600;">Confirm New Password</label>
            <input type="password" name="confirm_password" required
                   style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:inherit;">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Update Password</button>
    </form>
</div>

<div class="glass" style="padding:32px;border-radius:24px;max-width:600px;">
    <h3 style="font-weight:700;margin-bottom:16px;">Preferences</h3>
    <form method="POST" action="{{ url_for('account.update_preferences') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="checkbox" style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <input type="checkbox" name="email_notifications" checked>
            <span>Receive email notifications</span>
        </label>
        <label class="checkbox" style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <input type="checkbox" name="friend_requests_notifications" checked>
            <span>Friend request notifications</span>
        </label>
        <button type="submit" class="btn btn-primary btn-full">Save Preferences</button>
    </form>
</div>
{% endblock %}
