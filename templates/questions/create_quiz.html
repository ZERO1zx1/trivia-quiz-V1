{% extends "layouts/base.html" %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<h1>Create Your Quiz</h1>
<div id="quizBuilder">
    <div class="question-block" v-for="(q, idx) in questions" :key="idx">
        <input v-model="q.text" placeholder="Question">
        <input v-model="q.correct" placeholder="Correct answer">
        <input v-model="q.wrong1" placeholder="Wrong answer">
        <input v-model="q.wrong2" placeholder="Wrong answer">
        <input v-model="q.wrong3" placeholder="Wrong answer">
    </div>
    <button @click="addQuestion">+ Add Question</button>
    <button @click="saveQuiz">Save Quiz</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
<script>
new Vue({
    el: '#quizBuilder',
    data: { questions: [{text:'', correct:'', wrong1:'', wrong2:'', wrong3:''}] },
    methods: {
        addQuestion() { this.questions.push({text:'', correct:'', wrong1:'', wrong2:'', wrong3:''}); },
        async saveQuiz() {
            const resp = await apiFetch('/user-questions/create-quiz', {
                method: 'POST',
                body: JSON.stringify({ questions: this.questions })
            });
            if (resp.quiz_code) {
                showToast(`Quiz created! Code: ${resp.quiz_code}`, 'success');
                window.location.href = `/quiz/play/${resp.quiz_code}`;
            }
        }
    }
});
</script>
{% endblock %}
